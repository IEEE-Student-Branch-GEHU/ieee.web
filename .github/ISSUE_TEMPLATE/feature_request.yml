name: ✨ Feature Request
description: Suggest an idea for this project.
labels: ["enhancement"]
body:
  - type: textarea
    id: feature-description
    attributes:
      label: Description of the feature
      description: Provide a clear and concise description of what the feature is.
    validations:
      required: true
  - type: textarea
    id: why-needed
    attributes:
      label: Why is this feature needed?
      description: Explain the use case and how it benefits the IEEE Student Branch.
    validations:
      required: true
  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other context or screenshots about the feature request here.
